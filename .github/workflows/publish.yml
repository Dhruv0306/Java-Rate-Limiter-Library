name: Publish to GitHub Packages

on:
    push:
        tags:
            - 'v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            -   uses: actions/checkout@v4

            -   uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'
                    server-id: github
                    server-username: MAVEN_USERNAME
                    server-password: MAVEN_PASSWORD

            -   name: Set version from git tag
                run: |
                    VERSION="${GITHUB_REF_NAME#v}"
                    [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]] || { echo "Tag name must be in the format vX.Y.Z"; exit 1; }
                    echo "Setting version to $VERSION"
                    mvn --batch-mode -ntp versions:set -DnewVersion="$VERSION" -DprocessAllModules=true -DgenerateBackupPoms=false

            -   name: Publish package
                run: mvn --batch-mode -ntp deploy -Dgpg.skip=true
                env:
                    MAVEN_USERNAME: ${{ github.actor }}
                    MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}